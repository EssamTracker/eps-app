name: Setup Admin — get_admin_users Function

on:
  workflow_dispatch:
    inputs:
      access_token:
        description: 'Supabase Access Token (sbp_...)'
        required: true

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Create get_admin_users() Postgres function
        run: |
          curl -s -X POST \
            "https://api.supabase.com/v1/projects/jhrameohgbqcjtgruhue/database/query" \
            -H "Authorization: Bearer ${{ github.event.inputs.access_token }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "CREATE OR REPLACE FUNCTION get_admin_users() RETURNS TABLE(id uuid, email text, created_at timestamptz, last_sign_in_at timestamptz, raw_user_meta_data jsonb) LANGUAGE plpgsql SECURITY DEFINER SET search_path = public, auth AS $$ BEGIN IF auth.email() != '\''zereseos@hotmail.com'\'' THEN RAISE EXCEPTION '\''Unauthorized'\''; END IF; RETURN QUERY SELECT u.id, u.email::text, u.created_at, u.last_sign_in_at, u.raw_user_meta_data FROM auth.users u ORDER BY u.created_at DESC; END; $$; GRANT EXECUTE ON FUNCTION get_admin_users() TO authenticated;"
            }' | tee /tmp/result.json
          echo "=== Result ===" && cat /tmp/result.json
          if grep -q '"code"' /tmp/result.json; then
            echo "FAILED"
            exit 1
          else
            echo "SUCCESS — get_admin_users() function created"
          fi
